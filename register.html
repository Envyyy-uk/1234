<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | P2P Academy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <a href="index.html" class="logo-container">
            <span class="logo-text">P2P ACADEMY</span>
        </a>

        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main class="container register-page">

    <section class="page-header">
        <h1>Join P2P Academy</h1>
        <p>Create your account and start your journey.</p>
    </section>

    <section class="form-card">

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="btn btn-solid">Create Account</button>

        </form>

    </section>

</main>

<footer>
    <div class="footer-content">
        <p>&copy; 2026 P2P Academy</p>
        <p>Designed by Yaroslav Tsyrul</p>
    </div>
</footer>

</body>
</html>
